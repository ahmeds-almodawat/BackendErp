name: Local Quality Gate

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  qa-local:
    name: Full QA, Typecheck, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full quality gate
        run: npm run qa:all
